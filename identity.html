<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identity | 양유진 포트폴리오</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    /* 공통 스타일 스타일 코드 */
    :root {
      --bg-deep-navy: #0F172A;
      --bg-card: #1E293B;
      --accent-blue: #2563EB;
      --accent-glow: #3B82F6;
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Pretendard Variable", Pretendard, sans-serif;
    }

    body {
      background-color: var(--bg-deep-navy);
      color: var(--text-main);
      overflow-x: hidden;
      line-height: 1.6;
      padding-top: 70px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }

    section {
      padding: 100px 0;
      border-bottom: 1px solid #1E293B;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background-color: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid #1E293B;
      z-index: 1000;
      display: flex;
      align-items: center;
    }

    .nav-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .nav-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-main);
      text-decoration: none;
    }

    .nav-logo span {
      color: var(--accent-glow);
    }

    .nav-menu {
      display: flex;
      list-style: none;
      gap: 32px;
    }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .nav-link:hover {
      color: var(--text-main);
    }

    .section-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-main);
      border-left: 4px solid var(--accent-blue);
      padding-left: 12px;
    }

    .section-subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 40px;
      padding-left: 16px;
    }

    .hobby-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      /* 카드가 확장됨에 따라 간격을 조금 더 넓혔습니다 */
      width: 100%;
    }

    .hobby-card {
      background-color: #151F32;
      border: 1px solid #233149;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
    }

    .hobby-card:hover {
      border-color: var(--accent-glow);
      background-color: #1E293B;
      transform: translateY(-6px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
    }

    .hobby-img-wrapper {
      width: 100%;
      height: 200px;
      overflow: hidden;
      position: relative;
      background-color: #0B0F19;
    }

    .hobby-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .hobby-card:hover .hobby-img-wrapper img {
      transform: scale(1.05);
    }

    .hobby-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 1.2rem;
      line-height: 1;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .hobby-info {
      padding: 24px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .hobby-info h3 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .hobby-info p {
      font-size: 0.95rem;
      color: var(--text-muted);
      word-break: keep-all;
      line-height: 1.5;
    }

    .footer {
      padding: 80px 0;
      background-color: #0B0F19;
      text-align: center;
    }

    .links-wrapper {
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    .outro-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.2s ease;
      border-bottom: 1px solid transparent;
      padding-bottom: 2px;
    }

    .outro-link:hover {
      color: var(--accent-glow);
      border-color: var(--accent-glow);
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s ease;
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      body {
        padding-top: 60px;
      }

      .navbar {
        height: 60px;
      }

      .nav-menu {
        gap: 16px;
      }

      .hobby-container {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .hobby-img-wrapper {
        height: 220px;
      }

      .links-wrapper {
        flex-direction: column;
        gap: 20px;
      }
    }
  </style>
</head>

<body>
  <!-- 공통 네비게이션 바 -->
  <nav class="navbar">
    <div class="container nav-wrapper">
      <a href="index.html" class="nav-logo">Yujin<span>.dev</span></a>
      <ul class="nav-menu">
        <li><a href="identity.html" class="nav-link">Identity</a></li>
        <li><a href="strengths.html" class="nav-link">Core Strengths</a></li>
        <li><a href="tech.html" class="nav-link">Tech Stack</a></li>
      </ul>
    </div>
  </nav>

  <!-- Identity 섹션 -->
  <section id="identity" class="reveal">
    <div class="container">
      <h2 class="section-title">Identity</h2>
      <div class="section-subtitle">저를 조금 더 소개하자면! 이런 취미들을 가지고 있어요.</div>

      <div class="hobby-container">

        <!-- 카드 1: 야구 보기 -->
        <div class="hobby-card">
          <div class="hobby-img-wrapper">
            <img src="baseball.webp" alt="야구 경기장 직관 사진">
            <div class="hobby-badge">⚾</div>
          </div>
          <div class="hobby-info">
            <h3>야구 보기</h3>
            <p>시즌 중에는 틈날 때마다 야구 중계를 틀어놓는 열혈 야구 팬입니다!</p>
          </div>
        </div>

        <!-- 카드 2: 공연 관람 -->
        <div class="hobby-card">
          <div class="hobby-img-wrapper">
            <img src="performance.jpg" alt="뮤지컬 또는 연극 공연장 사진">
            <div class="hobby-badge">🎭</div>
          </div>
          <div class="hobby-info">
            <h3>공연 관람</h3>
            <p>여가 시간에는 뮤지컬이나 연극, 콘서트 같은 공연을 보러 다녀요.</p>
          </div>
        </div>

        <!-- 카드 3: 여행 다니기 -->
        <div class="hobby-card">
          <div class="hobby-img-wrapper">
            <img src="travel.png" alt="여행지 풍경 사진">
            <div class="hobby-badge">🧳</div>
          </div>
          <div class="hobby-info">
            <h3>여행 다니기</h3>
            <p>새로운 도시를 탐방하고, 꼼꼼하게 계획을 세워 떠나는 여행을 좋아합니다.</p>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- 공통 푸터 -->
  <footer class="footer">
    <div class="container">
      <div class="links-wrapper">
        <a href="mailto:dbwlsdid1114@naver.com" class="outro-link">Email</a>
        <a href="https://github.com/uxxin" target="_blank" class="outro-link">GitHub</a>
      </div>
    </div>
  </footer>

  <script>
    function reveal() {
      const reveals = document.querySelectorAll(".reveal");
      for (let i = 0; i < reveals.length; i++) {
        const windowHeight = window.innerHeight;
        const elementTop = reveals[i].getBoundingClientRect().top;
        const elementVisible = 150;
        if (elementTop < windowHeight - elementVisible) { reveals[i].classList.add("active"); }
      }
    }
    window.addEventListener("scroll", reveal);
    window.addEventListener("load", reveal);
  </script>
</body>

</html>
