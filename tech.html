<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Stack | 양유진 포트폴리오</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    /* 공통 스타일 코드 */
    :root {
      --bg-deep-navy: #0F172A;
      --bg-card: #1E293B;
      --accent-blue: #2563EB;
      --accent-glow: #3B82F6;
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Pretendard Variable", Pretendard, sans-serif;
    }

    body {
      background-color: var(--bg-deep-navy);
      color: var(--text-main);
      overflow-x: hidden;
      line-height: 1.6;
      padding-top: 70px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }

    section {
      padding: 100px 0;
      border-bottom: 1px solid #1E293B;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background-color: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid #1E293B;
      z-index: 1000;
      display: flex;
      align-items: center;
    }

    .nav-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .nav-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-main);
      text-decoration: none;
    }

    .nav-logo span {
      color: var(--accent-glow);
    }

    .nav-menu {
      display: flex;
      list-style: none;
      gap: 32px;
    }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .nav-link:hover {
      color: var(--text-main);
    }

    /* Tech 전용 스타일 */
    .section-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-main);
      border-left: 4px solid var(--accent-blue);
      padding-left: 12px;
    }

    .tech-container {
      margin-top: 32px;
    }

    .tech-group {
      margin-bottom: 24px;
    }

    .tech-group-title {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .tech-badge {
      display: inline-block;
      background-color: #1E293B;
      border: 1px solid #334155;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-right: 8px;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .footer {
      padding: 80px 0;
      background-color: #0B0F19;
      text-align: center;
    }

    .links-wrapper {
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    .outro-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.2s ease;
      border-bottom: 1px solid transparent;
      padding-bottom: 2px;
    }

    .outro-link:hover {
      color: var(--accent-glow);
      border-color: var(--accent-glow);
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s ease;
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      body {
        padding-top: 60px;
      }

      .navbar {
        height: 60px;
      }

      .nav-menu {
        gap: 16px;
      }

      .links-wrapper {
        flex-direction: column;
        gap: 20px;
      }
    }
  </style>
</head>

<body>
  <!-- 공통 네비게이션 바 -->
  <nav class="navbar">
    <div class="container nav-wrapper">
      <a href="yujin_profile.html" class="nav-logo">Yujin<span>.dev</span></a>
      <ul class="nav-menu">
        <li><a href="identity.html" class="nav-link">Identity</a></li>
        <li><a href="strengths.html" class="nav-link">Core Strengths</a></li>
        <li><a href="tech.html" class="nav-link">Tech Stack</a></li>
      </ul>
    </div>
  </nav>

  <!-- Tech Stack 섹션 -->
  <section id="tech" class="reveal">
    <div class="container">
      <h2 class="section-title">Tech Stack</h2>
      <div class="tech-container">
        <div class="tech-group">
          <div class="tech-group-title">Backend Core</div>
          <span class="tech-badge">JAVA</span>
          <span class="tech-badge">Spring Boot</span>
          <span class="tech-badge">MySQL</span>
        </div>
        <div class="tech-group">
          <div class="tech-group-title">Frontend</div>
          <span class="tech-badge">JavaScript</span>
          <span class="tech-badge">TypeScript</span>
          <span class="tech-badge">React</span>
          <span class="tech-badge">Next.js</span>
        </div>
        <div class="tech-group">
          <div class="tech-group-title">Design</div>
          <span class="tech-badge">Figma</span>
        </div>
      </div>
    </div>
  </section>

  <!-- 공통 푸터 -->
  <footer class="footer">
    <div class="container">
      <div class="links-wrapper">
        <a href="mailto:dbwlsdid1114@naver.com" class="outro-link">Email</a>
        <a href="https://github.com/uxxin" target="_blank" class="outro-link">GitHub</a>
      </div>
    </div>
  </footer>

  <script>
    function reveal() {
      const reveals = document.querySelectorAll(".reveal");
      for (let i = 0; i < reveals.length; i++) {
        const windowHeight = window.innerHeight;
        const elementTop = reveals[i].getBoundingClientRect().top;
        const elementVisible = 150;
        if (elementTop < windowHeight - elementVisible) { reveals[i].classList.add("active"); }
      }
    }
    window.addEventListener("scroll", reveal);
    window.addEventListener("load", reveal);
  </script>
</body>

</html>
